# Application Configuration
spring.application.name=shopping-api
server.port=8080
server.address=0.0.0.0



# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/finalterm?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# JWT Configuration
app.jwtSecret=mySecretKeyForJWTAuthenticationTokenGenerationAndValidationShoppingAPI
app.jwtExpirationInMs=86400000

# Logging
logging.level.root=INFO
logging.level.com.example.shoppingapi=DEBUG

logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestResponseBodyMethodProcessor=DEBUG
logging.level.com.fasterxml.jackson=DEBUG
