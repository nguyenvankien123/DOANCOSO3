<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div th:replace="admin/header :: header"></div>

<div class="container mt-4">
    <div class="row g-3">
        <div class="col-md-3">
            <div class="card text-white bg-primary mb-3">
                <div class="card-body">
                    <h5 class="card-title">Người dùng</h5>
                    <p class="card-text" id="userCount">-</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-success mb-3">
                <div class="card-body">
                    <h5 class="card-title">Đơn hàng</h5>
                    <p class="card-text" id="orderCount">-</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-info mb-3">
                <div class="card-body">
                    <h5 class="card-title">Doanh thu (Tháng này)</h5>
                    <p class="card-text" id="salesThisMonth">-</p>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-lg-6 mb-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Biểu đồ doanh thu (6 tháng gần nhất)</h5>
                    <canvas id="revenueChart" height="160"></canvas>
                </div>
            </div>
        </div>
        <div class="col-lg-6 mb-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Sản phẩm bán chạy</h5>
                    <canvas id="topProductsChart" height="160"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-6">
            <h4 id="users">Người dùng</h4>
            <table class="table table-sm" id="usersTable">
                <thead><tr><th>ID</th><th>Họ tên</th><th>Email</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="col-md-6">
            <h4 id="orders">Đơn hàng</h4>
            <table class="table table-sm" id="ordersTable">
                <thead><tr><th>ID</th><th>Khách</th><th>Trạng thái</th><th>Tổng</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
