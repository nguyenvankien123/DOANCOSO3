<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Người dùng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="p-3">
<div th:replace="admin/header :: header"></div>
<div class="container mt-4">
    <h2 th:text="${user.id} == null ? 'Thêm người dùng' : 'Sửa người dùng'"></h2>
    <form th:action="@{/admin/users/save}" th:object="${user}" method="post">
        <div class="mb-3">
            <label class="form-label">Họ và tên</label>
            <input class="form-control" th:field="*{name}" />
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" th:field="*{email}" />
        </div>
        <div class="mb-3">
            <label class="form-label">Số điện thoại</label>
            <input class="form-control" th:field="*{phone}" />
        </div>
        <div class="mb-3">
            <label class="form-label">Địa chỉ</label>
            <textarea class="form-control" th:field="*{address}"></textarea>
        </div>
        <button class="btn btn-primary">Lưu</button>
        <a class="btn btn-secondary" href="/admin/users">Hủy</a>
    </form>
</div>
<div th:replace="admin/footer :: footer"></div>
</body>
</html>
