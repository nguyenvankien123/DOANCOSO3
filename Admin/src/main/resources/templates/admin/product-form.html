<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="p-3">
<div th:replace="admin/header :: header"></div>
<div class="container mt-4">
    <h2 th:text="${product.id} == null ? 'Thêm sản phẩm' : 'Sửa sản phẩm'"></h2>
    <form th:action="@{/admin/products/save}" th:object="${product}" method="post">
        <div class="mb-3">
            <label class="form-label">Tên sản phẩm</label>
            <input class="form-control" th:field="*{name}" />
        </div>
        <div class="mb-3">
            <label class="form-label">Giá</label>
            <input class="form-control" th:field="*{price}" />
        </div>
        <div class="mb-3">
            <label class="form-label">Tồn kho</label>
            <input class="form-control" th:field="*{stock}" />
        </div>
        <div class="mb-3">
            <label class="form-label">Mô tả</label>
            <textarea class="form-control" th:field="*{description}"></textarea>
        </div>
        <button class="btn btn-primary">Lưu</button>
        <a class="btn btn-secondary" href="/admin/products">Hủy</a>
    </form>
</div>
<div th:replace="admin/footer :: footer"></div>
</body>
</html>
