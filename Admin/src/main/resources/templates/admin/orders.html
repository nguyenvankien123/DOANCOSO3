<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="p-3">
<div th:replace="admin/header :: header"></div>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Đơn hàng</h2>
    </div>

    <table class="table table-hover">
        <thead>
        <tr>
            <th>ID</th>
            <th>Khách hàng</th>
            <th>Trạng thái</th>
            <th>Tổng tiền</th>
            <th>Ngày</th>
            <th>Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="o : ${orders}">
            <td th:text="${o.id}"></td>
            <td th:text="${o.user != null ? o.user.name : 'Khách vãng lai'}"></td>
            <td th:text="${o.status}"></td>
            <td th:text="${o.totalPrice}"></td>
            <td th:text="${o.createdAt}"></td>
            <td>
                <a th:href="@{'/admin/orders/' + ${o.id} + '/edit'}" class="btn btn-sm btn-secondary">Xem</a>
                <form th:action="@{'/admin/orders/' + ${o.id} + '/delete'}" method="post" style="display:inline">
                    <button class="btn btn-sm btn-danger">Xóa</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<div th:replace="admin/footer :: footer"></div>
</body>
</html>
