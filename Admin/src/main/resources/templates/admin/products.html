<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="p-3">
<div th:replace="admin/header :: header"></div>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Sản phẩm</h2>
        <a class="btn btn-sm btn-primary" href="/admin/products/new">Thêm mới</a>
    </div>
    <table class="table table-sm">
        <thead><tr><th>ID</th><th>Name</th><th>Price</th><th>Stock</th><th>Actions</th></tr></thead>
        <tbody>
        <tr th:each="p : ${products}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.price}"></td>
            <td th:text="${p.stock}"></td>
            <td>
                <a th:href="@{'/admin/products/' + ${p.id} + '/edit'}" class="btn btn-sm btn-secondary">Sửa</a>
                <form th:action="@{'/admin/products/' + ${p.id} + '/delete'}" method="post" style="display:inline">
                    <button class="btn btn-sm btn-danger">Xóa</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<div th:replace="admin/footer :: footer"></div>
</body>
</html>
