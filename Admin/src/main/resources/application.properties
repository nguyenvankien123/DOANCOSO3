spring.application.name=Admin

# Run admin on a separate port
server.port=8082
# Database (connect directly to the same MySQL used by the main backend)
spring.datasource.url=jdbc:mysql://localhost:3306/finalterm?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA settings
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
